<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunflowerland Francky's Escape</title>
    <script src="config.js"></script>
    <style>
        @font-face {
            font-family: 'Retro';
            src: url('https://fonts.cdnfonts.com/css/common-pixel');
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #bg-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('assets/farcaster_banner.png') no-repeat center center;
            background-size: cover;
            opacity: 0.5;
            z-index: -1;
        }

        #game-ui {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            padding: 5px 15px;
            font-size: 24px;
            background: #000;
            border-bottom: 4px solid #555;
            box-sizing: border-box;
            z-index: 10;
            color: #FFFF00;
            font-weight: bold;
            flex-shrink: 0;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            flex-grow: 1;
            background: transparent; /* Show global background */
            overflow: hidden;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-height: 100%;
            image-rendering: pixelated;
            object-fit: contain;
            background: #000; /* Keep game area black */
        }

        #music-board {
            position: fixed;
            left: 5px;
            bottom: 5px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #555;
            padding: 5px;
            color: #fff;
            z-index: 120;
            width: 140px;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        @media (max-width: 600px) {
            #music-board {
                left: 5px;
                bottom: 5px;
                width: 100px;
                padding: 3px;
                transform: scale(0.7);
                transform-origin: bottom left;
            }
            .bottom-nav-btns {
                left: 110px; /* Positioned next to music board */
                bottom: 10px;
                gap: 5px;
            }
            #mobile-fire-btn {
                width: 80px;
                height: 80px;
                bottom: 30px; /* Adjusted position */
                right: 30px;
                font-size: 16px;
                background: rgba(255, 0, 0, 0.4);
                border: 3px solid rgba(255, 0, 0, 0.6);
                opacity: 0.9;
            }
        }

        #music-board h3 { margin: 0; font-size: 14px; color: #00FFFF; text-transform: uppercase; }
        #music-board .song-name { font-size: 12px; color: #FFFF00; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .audio-controls { display: flex; align-items: center; gap: 10px; }
        #pause-btn { background: #f0f; border: 2px solid #808; color: white; padding: 2px 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        input[type=range] { flex: 1; cursor: pointer; }

        #vpad-base {
            display: none;
            position: fixed;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.4);
        }
        
        #vpad-stick {
            display: none;
            position: fixed;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 51;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #mobile-fire-btn {
            display: none; 
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 0, 0.6);
            border-radius: 50%;
            font-weight: bold;
            font-size: 18px;
            border: 4px solid rgba(136, 0, 0, 0.8);
            color: white;
            z-index: 50;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        @media (hover: none) and (pointer: coarse) { #mobile-fire-btn { display: flex; } }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            overflow-y: auto;
        }

        #overlay h1 { font-size: 32px; margin-bottom: 10px; }
        .cpc-blue { color: #00FFFF; }
        .cpc-yellow { color: #FFFF00; }
        .cpc-red { color: #FF0000; }

        .heart {
            width: 25px;
            height: 25px;
            display: inline-block;
            background: #FFFF00;
            clip-path: polygon(50% 15%, 80% 0%, 100% 20%, 100% 50%, 50% 95%, 0% 50%, 0% 20%, 20% 0%);
            margin: 0 2px;
            transition: background 0.3s;
        }
        .heart.lost { background: #FF0000; }

        .start-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 #080;
            margin-top: 15px;
        }
        .start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #080; }

        .bottom-nav-btns {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 110;
        }
        
        @media (max-width: 600px) {
            .bottom-nav-btns {
                left: 10px;
                bottom: 15px;
                gap: 5px;
            }
            .bottom-nav-btns button {
                padding: 5px;
                font-size: 9px;
                width: 45px;
                height: 45px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                opacity: 0.5;
            }
            #mobile-fire-btn {
                width: 55px;
                height: 55px;
                bottom: 15px;
                right: 15px;
                font-size: 12px;
                background: rgba(255, 0, 0, 0.2);
                border: 2px solid rgba(255, 0, 0, 0.3);
                opacity: 0.6;
            }
        }

        .bottom-nav-btns button {
            background: #444;
            color: #fff;
            border: 2px solid #888;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 80%;
            max-width: 800px;
            max-height: 600px;
            background: #f4e4bc;
            color: #5d4037;
            padding: 20px;
            box-sizing: border-box;
            border: 8px solid #8b4513;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 200;
            font-family: 'Georgia', serif;
            background-image: radial-gradient(circle at center, #fdf5e6 0%, #f4e4bc 100%);
            flex-direction: column;
        }
        .popup.active { display: flex; }
        .popup h2 { margin-top: 0; margin-bottom: 10px; color: #8b4513; text-align: center; border-bottom: 2px solid #8b4513; flex-shrink: 0; }
        .popup-close { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; font-weight: bold; z-index: 210; }
        .popup-content { flex-grow: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; }
        .popup-content img { width: 100%; height: auto; object-fit: contain; border-radius: 5px; border: 2px solid #8b4513; box-sizing: border-box; }

        @media (max-width: 600px) {
            #game-ui { font-size: 16px; }
            #game-ui .heart { width: 15px; height: 15px; }
            .start-btn { font-size: 18px; }
            #overlay h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div id="bg-full"></div>
    
    <div class="bottom-nav-btns">
        <button onclick="togglePopup('story-popup')">STORY</button>
        <button onclick="alert('Rules will be added soon!')">RULES</button>
    </div>

    <div id="story-popup" class="popup">
        <span class="popup-close" onclick="togglePopup('story-popup')">&times;</span>
        <h2>Francky's Story</h2>
        <div class="popup-content">
            <img src="assets/lorefrancky.png" alt="Story Lore">
        </div>
    </div>

    <div id="game-ui">
        <div class="cpc-yellow">SCORE: <span id="score">000000</span></div>
        <div class="cpc-blue">LVL: <span id="level">1</span></div>
        <div class="cpc-red">
            LIVES: 
            <div id="hearts-container" style="display:inline-block; vertical-align: middle;">
                <div id="heart-1" class="heart"></div>
                <div id="heart-2" class="heart"></div>
                <div id="heart-3" class="heart"></div>
            </div>
        </div>
    </div>

    <div id="music-board">
        <h3>MUSIC</h3>
        <div class="song-name">franky's journey</div>
        <div class="audio-controls">
            <span id="mute-btn" style="cursor:pointer; font-size: 18px;">🔊</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
            <button id="pause-btn">||</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100%; padding: 20px 0;">
                <img src="assets/logoF.png" style="max-width: 80%; max-height: 15vh; object-fit: contain; margin-bottom: 20px; z-index: 2; position: relative;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; max-width: 700px; margin-bottom: 20px;">
                    <img src="assets/franky.png" style="width: 80px; height: 80px; transform: scale(1.2);">
                    <button class="start-btn" onclick="initGame()" style="z-index: 3; margin: 0;">START</button>
                    <img src="assets/franky.png" style="width: 80px; height: 80px; transform: scaleX(-1) scale(1.2);">
                </div>
                <div style="height: 10px;"></div>
            </div>
        </div>
    </div>

    <audio id="game-music" loop>
        <source src="assets_music/Francky's journey.m4a" type="audio/mp4">
    </audio>

    <div id="vpad-base"></div>
    <div id="vpad-stick"></div>
    <div id="mobile-fire-btn" ontouchstart="event.preventDefault(); firePip();">FIRE</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const overlay = document.getElementById('overlay');

        if (typeof GITHUB_CONFIG === 'undefined') { window.GITHUB_CONFIG = { token: '', repo: '', path: '' }; }

        const IS_MOBILE = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 600;
        const GRID_W = IS_MOBILE ? 12 : 16;
        const GRID_H = IS_MOBILE ? 16 : 12;
        let TILE_W, TILE_H;

        function togglePopup(id) {
            const popup = document.getElementById(id);
            popup.style.display = (popup.style.display === 'flex') ? 'none' : 'flex';
        }

        const vpadBase = document.getElementById('vpad-base');
        const vpadStick = document.getElementById('vpad-stick');
        let touchId = null, vpadStartX = 0, vpadStartY = 0, maxStickDist = 40;

        document.addEventListener('touchstart', (e) => {
            if (!state.running || state.paused || state.transition || touchId !== null) return;
            if (e.target.closest('#mobile-fire-btn') || e.target.closest('#game-ui') || e.target.closest('.bottom-nav-btns') || e.target.closest('.popup') || e.target.closest('#music-board')) return;
            const t = e.changedTouches[0]; touchId = t.identifier; vpadStartX = t.clientX; vpadStartY = t.clientY;
            vpadBase.style.display = 'block'; vpadStick.style.display = 'block';
            vpadBase.style.left = vpadStartX + 'px'; vpadBase.style.top = vpadStartY + 'px';
            vpadStick.style.left = vpadStartX + 'px'; vpadStick.style.top = vpadStartY + 'px';
            setDir(0, 0); state.player.isTouch = true;
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            if (touchId === null) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === touchId) {
                    e.preventDefault();
                    let dx = t.clientX - vpadStartX, dy = t.clientY - vpadStartY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > maxStickDist) { dx = (dx / dist) * maxStickDist; dy = (dy / dist) * maxStickDist; }
                    vpadStick.style.left = (vpadStartX + dx) + 'px'; vpadStick.style.top = (vpadStartY + dy) + 'px';
                    if (dist > 15) { if (Math.abs(dx) > Math.abs(dy)) { setDir(dx > 0 ? 1 : -1, 0); } else { setDir(0, dy > 0 ? 1 : -1); } } else { setDir(0, 0); state.player.isTouch = true; }
                    break;
                }
            }
        }, {passive: false});

        function endTouch(e) {
            if (touchId === null) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === touchId) {
                    touchId = null; vpadBase.style.display = 'none'; vpadStick.style.display = 'none';
                    setDir(0, 0); state.player.isTouch = false; break;
                }
            }
        }
        document.addEventListener('touchend', endTouch); document.addEventListener('touchcancel', endTouch);

        const ASSETS = {
            projectile: 'assets/projectil_no_bg.png', appleGold: 'assets/pommeor_no_bg.png', appleBronze: 'assets/pommebronze_no_bg.png',
            cherry: 'assets/collectible1_no_bg.png', cherry2: 'assets/collectible2_no_bg.png', cherry3: 'assets/collectible3_no_bg.png',
            monster1: 'assets/big_goblin1.png', monster2: 'assets/ennemi3_no_bg.png', gob1: 'assets/gob1.png', gob2: 'assets/gob2.png', gob3: 'assets/gob3.png',
            hive: 'assets/cave_entrance_no_bg.png', logo: 'assets/logoF.png', dead: 'assets/dead_no_bg.png', cup: 'assets/champion cup_no_bg.png',
            banner: 'assets/farcaster_banner.png', frankUp: 'assets/F_anime/up.png', frankDown: 'assets/F_anime/down.png', frankLeft: 'assets/F_anime/left.png',
            tileMain: 'assets/3.png', tile2: 'assets/4.png', tile3: 'assets/2.png', dugGround: 'assets/dug_ground.png'
        };
        const images = {};
        const MONSTER_TYPES = {
            BigNose: { points: 100, speed: 0.025, scale: 1.5, asset: 'monster1' }, Eggplant: { points: 75, speed: 0.02, scale: 1.5, asset: 'monster2', wallPass: false },
            Gob1: { points: 60, speed: 0.035, scale: 1.0, asset: 'gob1' }, Gob2: { points: 80, speed: 0.03, scale: 1.0, asset: 'gob2' },
            Gob3: { points: 120, speed: 0.045, scale: 1.0, asset: 'gob3' }, Frog: { points: 50, speed: 0.035, scale: 1.2, asset: 'monster2' }
        };
        const PALETTE = { BLACK: '#000000', BLUE: '#0000FF', CYAN: '#00FFFF', RED: '#FF0000', YELLOW: '#FFFF00', GREEN: '#00FF00', WHITE: '#FFFFFF', DIRT: '#8B4513' };
        const CELL = { EMPTY: 0, DIRT: 1, CHERRY: 2, APPLE: 3, SPAWN: 4, CHERRY2: 5, CHERRY3: 6, DIRT2: 7, DIRT3: 8 };

        const keys = {};
        window.addEventListener('keydown', e => { keys[e.key] = true; if (e.code === 'Space') { e.preventDefault(); firePip(); } if (e.key.toLowerCase() === 'p') togglePause(); });
        window.addEventListener('keyup', e => keys[e.key] = false);

        let state = {
            running: false, paused: false, score: 0, level: 1, lives: 3, grid: [],
            player: { x: Math.floor(GRID_W/2), y: GRID_H-2, dx: 0, dy: 0, lastDx: 1, lastDy: 0, dir: 'R', pip: null, invincibility: 0 },
            monsters: [], apples: [], bonusWord: "BONUS", bonusIndex: 0, frame: 0, transition: false, loopActive: false
        };

        const music = document.getElementById('game-music'), volumeSlider = document.getElementById('volume-slider'), muteBtn = document.getElementById('mute-btn'), pauseBtn = document.getElementById('pause-btn');
        volumeSlider.addEventListener('input', (e) => { music.volume = e.target.value; if (music.volume > 0) { muteBtn.innerText = '🔊'; music.muted = false; } else { muteBtn.innerText = '🔇'; } });
        muteBtn.addEventListener('click', () => { music.muted = !music.muted; muteBtn.innerText = music.muted ? '🔇' : '🔊'; });
        pauseBtn.addEventListener('click', togglePause);

        function togglePause() {
            if (!state.running || state.transition) return;
            state.paused = !state.paused; pauseBtn.innerText = state.paused ? '>' : '||';
            if (state.paused) music.pause(); else { music.play().catch(e => {}); if (!state.loopActive) { state.loopActive = true; requestAnimationFrame(gameLoop); } }
        }

        function preload() {
            let loaded = 0; const assetKeys = Object.keys(ASSETS);
            assetKeys.forEach(key => { const img = new Image(); img.src = ASSETS[key]; img.onload = () => { loaded++; if (loaded === assetKeys.length) console.log("Assets loaded"); }; img.onerror = () => { console.warn(`Asset ${key} not found`); loaded++; }; images[key] = img; });
        }

        function initGame() {
            state.score = 0; state.level = 1; state.lives = 3; state.bonusIndex = 0; state.frame = 0; state.running = true; state.paused = false; state.transition = false;
            overlay.style.display = 'none'; pauseBtn.innerText = '||'; loadLevel(state.level);
            music.play().catch(e => {}); if (!state.loopActive) { state.loopActive = true; requestAnimationFrame(gameLoop); }
        }

        function spawnMonster(isBonus = false) {
            let typeKey; if (isBonus) typeKey = 'Frog'; else { const rand = Math.random(); if (rand < 0.2) typeKey = 'BigNose'; else if (rand < 0.4) typeKey = 'Eggplant'; else if (rand < 0.6) typeKey = 'Gob1'; else if (rand < 0.8) typeKey = 'Gob2'; else typeKey = 'Gob3'; }
            const spawnX = Math.floor(GRID_W / 2) - 0.5;
            const m = { x: spawnX, y: 0.5, type: typeKey, dirX: 0, dirY: 1, targetX: spawnX, targetY: 0.5, letter: isBonus ? state.bonusWord[state.bonusIndex] : null };
            state.monsters.push(m);
        }

        function generateLevel(lvl) {
            state.grid = []; state.apples = []; state.monsters = [];
            for (let y = 0; y < GRID_H; y++) { state.grid[y] = []; for (let x = 0; x < GRID_W; x++) { const r = Math.random(); if (r < 0.6) state.grid[y][x] = CELL.DIRT; else if (r < 0.8) state.grid[y][x] = CELL.DIRT2; else state.grid[y][x] = CELL.DIRT3; } }
            const spawnX = Math.floor(GRID_W / 2) - 1;
            for (let y = 0; y < 6; y++) { if (state.grid[y]) { state.grid[y][spawnX] = CELL.EMPTY; state.grid[y][spawnX+1] = CELL.EMPTY; } }
            if (state.grid[5]) { for (let x = Math.max(0, spawnX-3); x < Math.min(GRID_W, spawnX+5); x++) state.grid[5][x] = CELL.EMPTY; }
            for (let i = 0; i < 8; i++) {
                let x = Math.floor(Math.random() * GRID_W), y = Math.floor(Math.random() * GRID_H);
                let len = 4 + Math.floor(Math.random() * 4), horiz = Math.random() > 0.5;
                for (let j = 0; j < len; j++) { if (x >= 0 && x < GRID_W && y >= 0 && y < GRID_H) { if (!(y < 6 && (x === spawnX || x === spawnX+1))) { if (state.grid[y]) state.grid[y][x] = CELL.EMPTY; } } if (horiz) x++; else y++; }
            }
            for (let i = 0; i < 10 + lvl; i++) {
                let cx = Math.floor(Math.random() * (GRID_W - 1)), cy = Math.floor(Math.random() * (GRID_H - 1));
                if (cy < 6 && (cx >= spawnX-1 && cx <= spawnX+1)) continue;
                const type = [CELL.CHERRY, CELL.CHERRY2, CELL.CHERRY3][Math.floor(Math.random() * 3)];
                if (state.grid[cy]) state.grid[cy][cx] = type; if (state.grid[cy+1]) state.grid[cy+1][cx] = type; if (state.grid[cy]) state.grid[cy][cx+1] = type;
            }
            for (let i = 0; i < 4 + lvl; i++) {
                let ax = Math.floor(Math.random() * GRID_W), ay = Math.floor(Math.random() * (GRID_H - 3));
                if (ay > 1) { if (ay < 6 && (ax === spawnX || ax === spawnX+1)) continue; if (state.grid[ay]) state.grid[ay][ax] = CELL.EMPTY; state.apples.push({ x: ax, y: ay, state: 'static', pushTimer: 0, type: Math.random() > 0.3 ? 'gold' : 'bronze' }); }
            }
            if (state.grid[0]) { state.grid[0][spawnX] = CELL.SPAWN; state.grid[0][spawnX+1] = CELL.SPAWN; }
            state.player.x = Math.floor(GRID_W/2); state.player.y = GRID_H-2; state.player.dx = 0; state.player.dy = 0; state.player.pip = null; state.player.invincibility = 60;
            for(let i=0; i<Math.min(lvl, 4); i++) spawnMonster();
        }

        function loadLevel(lvl) { generateLevel(lvl); levelEl.innerText = lvl; updateLivesDisplay(); scoreEl.innerText = String(state.score).padStart(6, '0'); }

        function nextLevel() {
            if (state.transition) return;
            state.transition = true; state.running = false; overlay.style.display = 'flex'; overlay.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;"><img src="${ASSETS.cup}" style="width: 120px; margin-bottom: 20px;"><h1 class="cpc-yellow">LEVEL ${state.level} CLEAR!</h1></div>`;
            setTimeout(() => { state.level++; loadLevel(state.level); state.running = true; state.transition = false; overlay.style.display = 'none'; if (!state.loopActive) { state.loopActive = true; requestAnimationFrame(gameLoop); } }, 2500);
        }

        function setDir(dx, dy) { if (!state.player) return; state.player.dx = dx; state.player.dy = dy; if (dx !== 0 || dy !== 0) { state.player.lastDx = dx; state.player.lastDy = dy; state.player.isTouch = true; } else { state.player.isTouch = false; } if (dx > 0) state.player.dir = 'R'; else if (dx < 0) state.player.dir = 'L'; else if (dy > 0) state.player.dir = 'D'; else if (dy < 0) state.player.dir = 'U'; }

        function firePip() { if (!state.player || state.player.pip || !state.running || state.transition || state.paused) return; const angleVar = (Math.random() - 0.5) * 0.8; const baseAngle = Math.atan2(state.player.lastDy, state.player.lastDx); const finalAngle = baseAngle + angleVar; state.player.pip = { x: state.player.x, y: state.player.y, dx: Math.cos(finalAngle), dy: Math.sin(finalAngle), bounces: 0, life: 0 }; }

        function update() {
            if (!state.running || state.transition || state.paused) return; state.frame++; if (state.player.invincibility > 0) state.player.invincibility--; if (state.frame % 1000 === 0) spawnMonster(true);
            const speedFactor = 1 + (Math.min(state.level, 3) - 1) * 0.05 + (state.level > 3 ? (state.level - 3) * 0.08 : 0);
            const frankSpeed = 0.06 * speedFactor;
            let adx = 0, ady = 0, keyPress = false; if (keys['ArrowUp'] || keys['w']) { ady = -1; keyPress = true; } else if (keys['ArrowDown'] || keys['s']) { ady = 1; keyPress = true; } else if (keys['ArrowLeft'] || keys['a']) { adx = -1; keyPress = true; } else if (keys['ArrowRight'] || keys['d']) { adx = 1; keyPress = true; }
            if (keyPress) { setDir(adx, ady); } else if (!state.player.isTouch) { state.player.dx = 0; state.player.dy = 0; }
            if (state.player.dx !== 0 || state.player.dy !== 0) {
                const nx = state.player.x + state.player.dx * frankSpeed, ny = state.player.y + state.player.dy * frankSpeed, gx = Math.round(nx), gy = Math.round(ny);
                if (gx >= 0 && gx < GRID_W && gy >= 0 && gy < GRID_H) {
                    const apple = state.apples.find(a => a.x === gx && a.y === gy);
                    if (!apple || apple.state === 'falling') { 
                        state.player.x = nx; state.player.y = ny; 
                        if (state.grid[gy]) {
                            const cell = state.grid[gy][gx];
                            if ([CELL.DIRT, CELL.DIRT2, CELL.DIRT3].includes(cell)) {
                                state.grid[gy][gx] = CELL.EMPTY;
                            } else if ([CELL.CHERRY, CELL.CHERRY2, CELL.CHERRY3].includes(cell)) {
                                const pts = cell === CELL.CHERRY ? 10 : (cell === CELL.CHERRY2 ? 20 : 50);
                                state.grid[gy][gx] = CELL.EMPTY;
                                addScore(pts);
                            }
                        }
                    }
                }
            }
            if (state.player.pip) {
                const p = state.player.pip; p.life++; p.x += p.dx * 0.15; p.y += p.dy * 0.15; const gx = Math.round(p.x), gy = Math.round(p.y); const distToFrank = Math.sqrt(Math.pow(state.player.x - p.x, 2) + Math.pow(state.player.y - p.y, 2));
                if (p.life > 15 && distToFrank < 0.4) state.player.pip = null; else if (gx < 0 || gx >= GRID_W || gy < 0 || gy >= GRID_H || (state.grid[gy] && [CELL.DIRT, CELL.DIRT2, CELL.DIRT3].includes(state.grid[gy][gx]))) { p.dx *= -1; p.dy *= -1; p.bounces++; if (p.bounces > 15) state.player.pip = null; }
                if (state.player.pip) { for (let i = state.monsters.length - 1; i >= 0; i--) { const m = state.monsters[i]; if (m && Math.abs(m.x - p.x) < 0.7 && Math.abs(m.y - p.y) < 0.7) { if (m.letter) { state.bonusIndex++; if (state.bonusIndex >= state.bonusWord.length) { state.lives++; state.bonusIndex = 0; updateLivesDisplay(); } } const pts = MONSTER_TYPES[m.type] ? MONSTER_TYPES[m.type].points : 50; state.monsters.splice(i, 1); state.player.pip = null; addScore(pts); break; } } }
            }
            state.monsters.forEach((m, mIdx) => {
                if (!m) return; const typeData = MONSTER_TYPES[m.type], monsterSpeed = (typeData ? typeData.speed : 0.025) * speedFactor;
                if (Math.abs(m.x - m.targetX) < 0.1 && Math.abs(m.y - m.targetY) < 0.1) {
                    m.x = m.targetX; m.y = m.targetY; let possible = []; [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy]) => { const nx = m.x + dx, ny = m.y + dy; if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) { if (!typeData.wallPass && state.grid[ny] && state.grid[ny][nx] !== CELL.EMPTY) return; possible.push({dx, dy}); } });
                    if (possible.length > 0) { let choice = possible[Math.floor(Math.random() * possible.length)]; if (Math.random() < 0.7) { let best = choice; let minDist = 1000; possible.forEach(p => { const d = Math.abs(m.x + p.dx - state.player.x) + Math.abs(m.y + p.dy - state.player.y); if (d < minDist) { minDist = d; best = p; } }); choice = best; } m.dirX = choice.dx; m.dirY = choice.dy; m.targetX = m.x + m.dirX; m.targetY = m.y + m.dirY; }
                }
                m.x += m.dirX * monsterSpeed; m.y += m.dirY * monsterSpeed;
                if (state.grid[Math.round(m.y)] && [CELL.DIRT, CELL.DIRT2, CELL.DIRT3].includes(state.grid[Math.round(m.y)][Math.round(m.x)])) state.grid[Math.round(m.y)][Math.round(m.x)] = CELL.EMPTY;
                if (state.player.invincibility <= 0 && Math.abs(m.x - state.player.x) < 0.6 && Math.abs(m.y - state.player.y) < 0.6) die();
                state.apples.forEach(a => { if (a.state === 'falling' && Math.abs(a.x - m.x) < 0.5 && Math.abs(a.y - m.y) < 0.5) { state.monsters.splice(mIdx, 1); addScore(100); } });
            });
            state.apples.forEach(a => { const gx = a.x, gy = Math.floor(a.y); if (a.state === 'static') { if (gy < GRID_H - 1 && state.grid[gy+1] && state.grid[gy+1][gx] === CELL.EMPTY && !state.apples.find(o => o.x === gx && o.y === gy+1)) { if (Math.abs(state.player.x - gx) > 0.8 || Math.abs(state.player.y - (gy+1)) > 0.8) a.state = 'falling'; } } else if (a.state === 'falling') { a.y += 0.15; const ngy = Math.floor(a.y + 0.9); if (ngy >= GRID_H || (state.grid[ngy] && state.grid[ngy][gx] !== CELL.EMPTY)) { a.y = Math.floor(a.y); a.state = 'static'; } if (state.player.invincibility <= 0 && Math.abs(state.player.x - a.x) < 0.6 && Math.abs(state.player.y - a.y) < 0.6) die(); } });
            if (!state.grid.flat().some(c => [CELL.CHERRY, CELL.CHERRY2, CELL.CHERRY3].includes(c))) nextLevel();
        }

        function draw() {
            if (!ctx) return; ctx.fillStyle = PALETTE.BLACK; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const SC_DEFAULT = 1.5, ROCK_SC = 2.0; 
            for (let y = 0; y < GRID_H; y++) {
                if (!state.grid[y]) continue;
                for (let x = 0; x < GRID_W; x++) {
                    const cell = state.grid[y][x], px = x * TILE_W, py = y * TILE_H;
                    // Draw with 1px overlap to remove gaps
                    const drawW = TILE_W + 1, drawH = TILE_H + 1;
                    if ([CELL.DIRT, CELL.DIRT2, CELL.DIRT3].includes(cell)) { 
                        let img = cell === CELL.DIRT ? images.tileMain : (cell === CELL.DIRT2 ? images.tile2 : images.tile3); 
                        if (img && img.complete) ctx.drawImage(img, px, py, drawW, drawH); 
                        else { ctx.fillStyle = PALETTE.DIRT; ctx.fillRect(px, py, drawW, drawH); } 
                    }
                    else { 
                        if (images.dugGround && images.dugGround.complete) ctx.drawImage(images.dugGround, px, py, drawW, drawH); 
                        else { ctx.fillStyle = PALETTE.BLACK; ctx.fillRect(px, py, drawW, drawH); } 
                        if ([CELL.CHERRY, CELL.CHERRY2, CELL.CHERRY3].includes(cell)) { 
                            let img = cell === CELL.CHERRY ? images.cherry : (cell === CELL.CHERRY2 ? images.cherry2 : images.cherry3); 
                            if (img && img.complete) { const sw = TILE_W * SC_DEFAULT, sh = TILE_H * SC_DEFAULT; ctx.drawImage(img, px - (sw-TILE_W)/2, py - (sh-TILE_H)/2, sw, sh); } 
                        } 
                    }
                }
            }
            if (images.hive && images.hive.complete) { const px = (Math.floor(GRID_W/2)-2) * TILE_W, py = -0.1 * TILE_H; ctx.drawImage(images.hive, px, py, TILE_W * 4, TILE_H * 1.5); }
            state.apples.forEach(a => { const img = a.type === 'gold' ? images.appleGold : images.appleBronze; if (img && img.complete) { const sw = TILE_W * ROCK_SC, sh = TILE_H * ROCK_SC; ctx.drawImage(img, a.x * TILE_W - (sw-TILE_W)/2, a.y * TILE_H - (sh-TILE_H)/2, sw, sh); } });
            if (state.player.pip && images.projectile && images.projectile.complete) { const sw = TILE_W * SC_DEFAULT, sh = TILE_H * SC_DEFAULT; ctx.save(); ctx.translate(state.player.pip.x * TILE_W + TILE_W/2, state.player.pip.y * TILE_H + TILE_H/2); ctx.rotate(state.frame * 0.2); ctx.drawImage(images.projectile, -sw/2, -sh/2, sw, sh); ctx.restore(); }
            state.monsters.forEach(m => { if (!m) return; const typeData = MONSTER_TYPES[m.type], img = images[typeData ? typeData.asset : 'monster1']; if (img && img.complete) { const scale = typeData ? typeData.scale : SC_DEFAULT, sw = TILE_W * scale, sh = TILE_H * scale; ctx.drawImage(img, m.x * TILE_W - (sw-TILE_W)/2, m.y * TILE_H - (sh-TILE_H)/2, sw, sh); } });
            if (state.player && state.player.invincibility % 10 < 5) { const ppx = state.player.x * TILE_W, ppy = state.player.y * TILE_H; let img = images.frankDown; if (state.player.dir === 'U') img = images.frankUp; else if (state.player.dir === 'D') img = images.frankDown; else if (state.player.dir === 'L' || state.player.dir === 'R') img = images.frankLeft; if (img && img.complete) { ctx.save(); if (state.player.dir === 'L') { ctx.translate(ppx + TILE_W, ppy); ctx.scale(-1, 1); ctx.drawImage(img, 0, 0, TILE_W, TILE_H); } else { ctx.drawImage(img, ppx, ppy, TILE_W, TILE_H); } ctx.restore(); } }
            if (state.paused) { ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "white"; ctx.font = "32px Courier New"; ctx.textAlign = "center"; ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2); }
        }

        function addScore(pts) { state.score += pts; scoreEl.innerText = String(state.score).padStart(6, '0'); }
        function updateHearts() { for (let i = 1; i <= 3; i++) { const heartEl = document.getElementById(`heart-${i}`); if (heartEl) { if (i <= state.lives) heartEl.classList.remove('lost'); else heartEl.classList.add('lost'); } } }
        function updateLivesDisplay() { updateHearts(); }

        async function fetchGlobalLeaderboard() { try { const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, { headers: { 'Authorization': `token ${GITHUB_CONFIG.token}`, 'Cache-Control': 'no-cache' } }); if (res.ok) { const data = await res.json(); const content = decodeURIComponent(escape(atob(data.content))); return { scores: JSON.parse(content), sha: data.sha }; } } catch (e) { console.error("Global leaderboard fetch failed", e); } return { scores: [], sha: null }; }
        async function uploadScore(name, score) { try { const { scores, sha } = await fetchGlobalLeaderboard(); scores.push({ name, score, date: new Date().toLocaleDateString() }); scores.sort((a, b) => b.score - a.score); const topScores = scores.slice(0, 10); const content = btoa(unescape(encodeURIComponent(JSON.stringify(topScores, null, 2)))); const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, { method: 'PUT', headers: { 'Authorization': `token ${GITHUB_CONFIG.token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `Score update: ${name} - ${score}`, content: content, sha: sha }) }); return res.ok; } catch (e) { console.error("Global score upload failed", e); return false; } }
        async function showLeaderboard() { 
            const container = document.getElementById('leaderboard-container'); 
            if (!container) return;
            
            // Show local immediately
            let localBoard = JSON.parse(localStorage.getItem('sfl_leaderboard') || '[]'); 
            let html = '<h2 class="cpc-yellow" style="margin-top:0; font-size:24px;">LEADERBOARD</h2><table style="font-size:16px; margin: 0 auto; color:#fff; border-collapse:collapse; text-align:left;">'; 
            localBoard.forEach((s, i) => { let name = s.name || 'PLAYER'; html += `<tr><td style="padding:0 10px 5px 0;">${i+1}.</td><td style="padding:0 10px 5px 0; color:#0f0; text-transform:uppercase;">${name.substring(0,10)}</td><td style="padding:0 0 5px 0; text-align:right;">${String(s.score).padStart(6,'0')}</td></tr>`; }); 
            html += '</table><div style="font-size:10px; margin-top:5px;">(Syncing global...)</div>'; 
            container.innerHTML = html; 

            // Fetch global and update
            const { scores } = await fetchGlobalLeaderboard(); 
            if (scores.length > 0) {
                html = '<h2 class="cpc-yellow" style="margin-top:0; font-size:24px;">GLOBAL LEADERBOARD</h2><table style="font-size:16px; margin: 0 auto; color:#fff; border-collapse:collapse; text-align:left;">'; 
                scores.forEach((s, i) => { let name = s.name || 'PLAYER'; html += `<tr><td style="padding:0 10px 5px 0;">${i+1}.</td><td style="padding:0 10px 5px 0; color:#0f0; text-transform:uppercase;">${name.substring(0,10)}</td><td style="padding:0 0 5px 0; text-align:right;">${String(s.score).padStart(6,'0')}</td></tr>`; }); 
                html += '</table>'; 
                container.innerHTML = html; 
            }
        }
        async function submitScoreToRender(name, score) {
            try {
                const res = await fetch('https://sudokumabe-api.onrender.com/api/scores', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ player: name, score: score, game: 'fruity_frank' })
                });
                return res.ok;
            } catch (e) {
                console.error("Render API submission failed", e);
                return false;
            }
        }

        async function submitScore() { 
            const saveBtn = document.querySelector("#score-form button"); 
            if (saveBtn) { saveBtn.disabled = true; saveBtn.innerText = 'SAVING...'; } 
            let playerName = (document.getElementById('player-name') ? document.getElementById('player-name').value.trim() : 'Player') || 'Player'; 
            localStorage.setItem('sfl_playerName', playerName); 
            
            // Backup local
            let localBoard = JSON.parse(localStorage.getItem('sfl_leaderboard') || '[]'); 
            localBoard.push({name: playerName, score: state.score, date: new Date().toLocaleDateString()}); 
            localBoard.sort((a,b) => b.score - a.score); 
            localStorage.setItem('sfl_leaderboard', JSON.stringify(localBoard.slice(0, 5))); 
            
            // Hide form immediately so user isn't blocked
            document.getElementById('score-form').style.display = 'none'; 
            
            // Render + GitHub (Dual Save) - non-blocking background tasks
            Promise.all([
                submitScoreToRender(playerName, state.score),
                uploadScore(playerName, state.score)
            ]).then(() => {
                showLeaderboard(); // Refresh if global fetch worked
            });
            
            // Show local leaderboard immediately
            await showLeaderboard(); 
        }

        function die() {
            state.lives--; updateLivesDisplay();
            if (state.lives <= 0) { 
                state.running = false; let defaultName = localStorage.getItem('sfl_playerName') || 'Player'; overlay.style.display = 'flex'; 
                overlay.innerHTML = `<div style="display: flex; flex-direction: column; align-items: center; justify-content: flex-start; width: 100%; min-height: 100%; padding: 20px 0;"><img src="${ASSETS.dead}" style="width: 80px; margin-bottom: 10px;"><h1 class="cpc-red" style="margin:0 0 5px 0;">GAME OVER</h1><div class="cpc-yellow" style="font-size:20px; margin-bottom:10px;">SCORE: ${String(state.score).padStart(6,'0')}</div><div id="score-form" style="margin-bottom: 10px; display:flex; gap:5px; align-items:center;"><input type="text" id="player-name" value="${defaultName}" maxlength="10" style="font-size:16px; padding:5px; text-align:center; background:#000; color:#0f0; border:2px solid #0f0; width:100px; font-family:inherit; text-transform:uppercase;"><button onclick="submitScore()" style="font-size:16px; padding:5px 10px; background:#0f0; color:#000; border:none; cursor:pointer; font-weight:bold;">SAVE</button></div><div id="leaderboard-container" style="margin-bottom:15px; min-height: 100px;"></div><button class="start-btn" onclick="initGame()" style="margin-top:0; margin-bottom: 20px;">RETRY</button></div>`; 
                showLeaderboard();
            } else { state.player.x = Math.floor(GRID_W/2); state.player.y = GRID_H-2; state.player.pip = null; state.player.invincibility = 60; }
        }
        function gameLoop() { if (!state.running || (state.paused && state.loopActive)) { if (state.paused) draw(); state.loopActive = false; return; } update(); draw(); requestAnimationFrame(gameLoop); }
        function resize() { canvas.width = 800; canvas.height = (canvas.width / GRID_W) * GRID_H; TILE_W = canvas.width / GRID_W; TILE_H = canvas.height / GRID_H; }
        window.addEventListener('resize', resize); resize(); preload();
    </script>
</body>
